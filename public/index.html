<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b0f1a" />
<title>ASE Live</title>
<style>
  :root {
    --bg: #0b0f1a; --card: #141a2b; --card2: #1b2236; --line: #242c44;
    --txt: #eef1f8; --dim: #8b93ac; --up: #1fbf75; --down: #ff5466;
    --accent: #2f80ed;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; background: var(--bg); color: var(--txt);
    font: 15px/1.4 -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
    padding-bottom: env(safe-area-inset-bottom);
  }
  header {
    position: sticky; top: 0; z-index: 5; background: rgba(11,15,26,.92);
    backdrop-filter: blur(8px); border-bottom: 1px solid var(--line);
    padding: calc(10px + env(safe-area-inset-top)) 14px 10px;
  }
  .brand { font-weight: 700; letter-spacing: .5px; font-size: 16px; }
  .brand b { color: var(--accent); }
  .idx { display: flex; align-items: baseline; gap: 10px; margin-top: 6px; }
  .idx .val { font-size: 26px; font-weight: 700; }
  .idx .chg { font-size: 15px; font-weight: 600; }
  .idx .meta { margin-left: auto; font-size: 11px; color: var(--dim); text-align: right; }
  .up { color: var(--up); } .down { color: var(--down); } .flat { color: var(--dim); }

  .controls { display: flex; gap: 8px; margin-top: 10px; }
  #q {
    flex: 1; background: var(--card2); border: 1px solid var(--line); color: var(--txt);
    border-radius: 10px; padding: 9px 12px; font-size: 15px; outline: none;
  }
  .tabs { display: flex; gap: 6px; margin-top: 10px; overflow-x: auto; }
  .tab {
    flex: 0 0 auto; padding: 7px 14px; border-radius: 999px; font-size: 13px; font-weight: 600;
    background: var(--card2); color: var(--dim); border: 1px solid var(--line);
  }
  .tab.on { color: #fff; background: var(--accent); border-color: transparent; }

  ul { list-style: none; margin: 0; padding: 6px 8px 24px; }
  .row {
    display: grid; grid-template-columns: 26px 1fr auto auto; align-items: center; gap: 10px;
    padding: 11px 10px 11px 6px; background: var(--card); border: 1px solid var(--line);
    border-radius: 12px; margin: 7px 0;
  }
  .row:active { background: var(--card2); }
  .star {
    font-size: 19px; line-height: 1; color: var(--dim); text-align: center;
    padding: 6px 2px; cursor: pointer; user-select: none;
  }
  .star.on { color: #f4c14b; }
  .sym { font-weight: 700; font-size: 15px; }
  .name { color: var(--dim); font-size: 11px; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 46vw; }
  .last { font-variant-numeric: tabular-nums; font-weight: 600; text-align: right; }
  .pill {
    font-variant-numeric: tabular-nums; font-weight: 700; font-size: 13px; text-align: right;
    min-width: 64px; padding: 4px 8px; border-radius: 8px;
  }
  .pill.up { background: rgba(31,191,117,.13); }
  .pill.down { background: rgba(255,84,102,.13); }
  .pill.flat { background: var(--card2); }

  .muted { color: var(--dim); text-align: center; padding: 30px; font-size: 13px; }

  /* detail sheet */
  .sheet-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 20;
    display: none; align-items: flex-end;
  }
  .sheet-bg.show { display: flex; }
  .sheet {
    width: 100%; max-height: 86vh; overflow: auto; background: var(--bg);
    border-radius: 18px 18px 0 0; border-top: 1px solid var(--line);
    padding: 16px 16px calc(20px + env(safe-area-inset-bottom));
  }
  .sheet h2 { margin: 0; font-size: 20px; }
  .sheet .sub { color: var(--dim); font-size: 12px; margin: 2px 0 14px; }
  .grab { width: 40px; height: 4px; background: var(--line); border-radius: 99px; margin: 0 auto 12px; }
  .quote { margin: 8px 0 16px; }
  .quote .big { font-size: 30px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .quote .delta { font-size: 15px; font-weight: 700; margin-left: 8px; }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
  .stat {
    background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 9px 11px;
  }
  .stat .k { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
  .stat .v { font-size: 17px; font-weight: 700; font-variant-numeric: tabular-nums; margin-top: 2px; }
  .chartwrap { margin: 14px 0 4px; }
  .spark { width: 100%; height: 96px; display: block; }
  .chartcap { display: flex; justify-content: space-between; color: var(--dim); font-size: 11px; margin-top: 4px; }
  .chartcap .pc { color: var(--dim); }
  .book { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .book h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .6px; color: var(--dim); margin: 0 0 6px; }
  .lvl { display: flex; justify-content: space-between; font-variant-numeric: tabular-nums;
    font-size: 13px; padding: 5px 8px; border-radius: 7px; margin: 3px 0; }
  .lvl.bid { background: rgba(31,191,117,.10); } .lvl.ask { background: rgba(255,84,102,.10); }
  .lvl .q { color: var(--dim); }
  .tape { margin-top: 16px; }
  .tape .t { display: grid; grid-template-columns: auto 1fr auto; gap: 10px;
    font-variant-numeric: tabular-nums; font-size: 13px; padding: 6px 8px;
    border-bottom: 1px solid var(--line); }
  .tape .t .tm { color: var(--dim); }
  .err { color: var(--down); }
</style>
</head>
<body>
<header>
  <div class="brand"><b>ASE</b> Live · Amman Stock Exchange</div>
  <div class="idx">
    <span class="val" id="idxVal">—</span>
    <span class="chg" id="idxChg">—</span>
    <span class="meta" id="idxMeta"></span>
  </div>
  <div class="controls">
    <input id="q" placeholder="Search symbol or company…" autocomplete="off" />
  </div>
  <div class="tabs" id="tabs">
    <div class="tab on" data-t="all">All</div>
    <div class="tab" data-t="watch">★ Watch</div>
    <div class="tab" data-t="gainers">Gainers</div>
    <div class="tab" data-t="losers">Losers</div>
    <div class="tab" data-t="active">Active</div>
  </div>
</header>

<ul id="list"><li class="muted">Loading live prices…</li></ul>

<div class="sheet-bg" id="sheetBg">
  <div class="sheet" id="sheet"></div>
</div>

<script>
const $ = (s) => document.querySelector(s);
let tab = 'all';
let allRows = [];        // from /api/ticker
let listData = [];       // current tab data
let query = '';
let watch = new Set(JSON.parse(localStorage.getItem('ase_watch') || '[]'));
const saveWatch = () => localStorage.setItem('ase_watch', JSON.stringify([...watch]));
function toggleWatch(sym) {
  if (watch.has(sym)) watch.delete(sym); else watch.add(sym);
  saveWatch();
  if (tab === 'watch') loadList(); else render();
}

const fmt = (n, d = 2) => (n == null ? '—' : Number(n).toLocaleString(undefined, { minimumFractionDigits: d, maximumFractionDigits: d }));
const cls = (n) => (n > 0 ? 'up' : n < 0 ? 'down' : 'flat');
const sign = (n) => (n > 0 ? '+' : '') + fmt(n, 2) + '%';

async function getJson(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

async function loadIndex() {
  try {
    const i = await getJson('/api/index');
    $('#idxVal').textContent = fmt(i.value);
    const c = $('#idxChg');
    c.textContent = (i.changePct > 0 ? '▲ ' : i.changePct < 0 ? '▼ ' : '') + sign(i.changePct);
    c.className = 'chg ' + cls(i.changePct);
    $('#idxMeta').textContent = `Vol ${fmt(i.volume,0)} · Val ${fmt(i.turnover,0)} · ${fmt(i.trades,0)} trades`;
  } catch (e) {}
}

async function loadList() {
  try {
    if (tab === 'all' || tab === 'watch') {
      const d = await getJson('/api/ticker');
      allRows = d.rows.filter(r => r.last != null);
      listData = tab === 'watch' ? allRows.filter(r => watch.has(r.sym)) : allRows;
    } else {
      const d = await getJson('/api/' + tab);
      listData = d.map(r => ({ sym: r.sym, name: r.name, last: r.price, chg: r.chg }));
    }
    render();
  } catch (e) {
    $('#list').innerHTML = `<li class="muted err">Could not load data: ${e.message}</li>`;
  }
}

function render() {
  const q = query.toLowerCase();
  const rows = listData.filter(r =>
    !q || r.sym.toLowerCase().includes(q) || (r.name || '').toLowerCase().includes(q));
  if (!rows.length) {
    const msg = tab === 'watch' && !q
      ? 'Your watchlist is empty — tap ☆ next to any symbol to add it.'
      : 'No matches';
    $('#list').innerHTML = `<li class="muted">${msg}</li>`;
    return;
  }
  $('#list').innerHTML = rows.map(r => `
    <li class="row" data-sym="${r.sym}">
      <div class="star ${watch.has(r.sym) ? 'on' : ''}" data-star="${r.sym}">${watch.has(r.sym) ? '★' : '☆'}</div>
      <div>
        <div class="sym">${r.sym}</div>
        ${r.name ? `<div class="name">${r.name}</div>` : ''}
      </div>
      <div class="last">${fmt(r.last)}</div>
      <div class="pill ${cls(r.chg)}">${sign(r.chg)}</div>
    </li>`).join('');
}

// mini intraday sparkline (chronological prices, dashed prev-close baseline)
function buildChart(prices, prevClose, dir) {
  if (!prices || prices.length < 2)
    return '<div class="muted" style="padding:18px">No intraday trades yet</div>';
  const W = 300, H = 96, pad = 10;
  const lo = Math.min(...prices, prevClose), hi = Math.max(...prices, prevClose);
  const span = (hi - lo) || 1;
  const X = (i) => (i / (prices.length - 1)) * W;
  const Y = (v) => H - pad - ((v - lo) / span) * (H - 2 * pad);
  const pts = prices.map((p, i) => `${X(i).toFixed(1)},${Y(p).toFixed(1)}`);
  const line = 'M' + pts.join(' L');
  const area = `M${X(0)},${H} L${pts.join(' L')} L${X(prices.length - 1)},${H} Z`;
  const baseY = Y(prevClose).toFixed(1);
  const col = dir > 0 ? 'var(--up)' : dir < 0 ? 'var(--down)' : 'var(--dim)';
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <line x1="0" y1="${baseY}" x2="${W}" y2="${baseY}" stroke="var(--dim)" stroke-width="1" stroke-dasharray="4 3" opacity="0.6" vector-effect="non-scaling-stroke"/>
    <path d="${area}" fill="${col}" opacity="0.12"/>
    <path d="${line}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
  </svg>`;
}

// detail sheet -------------------------------------------------------------
async function openSheet(sym) {
  const bg = $('#sheetBg'), sheet = $('#sheet');
  bg.classList.add('show');
  sheet.innerHTML = `<div class="grab"></div><h2>${sym}</h2><div class="sub">Loading…</div>`;
  try {
    const [quote, depth, intra] = await Promise.all([
      getJson('/api/quote?symbol=' + encodeURIComponent(sym)),
      getJson('/api/depth?symbol=' + encodeURIComponent(sym)),
      getJson('/api/intraday?symbol=' + encodeURIComponent(sym)),
    ]);
    const row = allRows.find(r => r.sym === sym) || quote;
    const bids = depth.bid.map(l => `<div class="lvl bid"><span>${fmt(l.price)}</span><span class="q">${fmt(l.qty,0)}</span></div>`).join('') || '<div class="muted">—</div>';
    const asks = depth.ask.map(l => `<div class="lvl ask"><span>${fmt(l.price)}</span><span class="q">${fmt(l.qty,0)}</span></div>`).join('') || '<div class="muted">—</div>';
    const tape = intra.trades.length
      ? intra.trades.map(t => `<div class="t"><span class="tm">${t.time}</span><span>${fmt(t.price)}</span><span>${fmt(t.qty,0)}</span></div>`).join('')
      : '<div class="muted">No trades yet</div>';
    const dn = quote.changePct;
    // trades come newest-first; reverse to chronological for the chart
    const chrono = intra.trades.map(t => t.price).filter(Number.isFinite).reverse();
    const tEarliest = intra.trades.length ? intra.trades[intra.trades.length - 1].time : '';
    const tLatest = intra.trades.length ? intra.trades[0].time : '';
    const chart = `
      <div class="chartwrap">
        ${buildChart(chrono, quote.prevClose, dn)}
        <div class="chartcap"><span>${tEarliest}</span><span class="pc">- - prev close ${fmt(quote.prevClose)}</span><span>${tLatest}</span></div>
      </div>`;
    sheet.innerHTML = `
      <div class="grab"></div>
      <h2><span class="star ${watch.has(sym)?'on':''}" data-sheetstar="${sym}" style="font-size:22px;padding:0 8px 0 0;display:inline">${watch.has(sym)?'★':'☆'}</span>${sym}</h2>
      <div class="sub">${quote.name || row.name || ''}</div>
      <div class="quote">
        <span class="big ${cls(dn)}">${fmt(quote.current)}</span>
        <span class="delta ${cls(dn)}">${quote.change!=null?(dn>0?'+':'')+fmt(quote.change):''} ${dn!=null?'('+sign(dn)+')':''}</span>
        <div class="stats">
          <div class="stat"><div class="k">Open</div><div class="v">${fmt(quote.open)}</div></div>
          <div class="stat"><div class="k">Prev Close</div><div class="v">${fmt(quote.prevClose)}</div></div>
          <div class="stat"><div class="k">High</div><div class="v up">${fmt(quote.high)}</div></div>
          <div class="stat"><div class="k">Low</div><div class="v down">${fmt(quote.low)}</div></div>
        </div>
      </div>
      ${chart}
      <div class="book">
        <div><h3>Bid</h3>${bids}</div>
        <div><h3>Ask</h3>${asks}</div>
      </div>
      <div class="tape"><h3>Recent trades</h3>${tape}</div>`;
  } catch (e) {
    sheet.innerHTML = `<div class="grab"></div><h2>${sym}</h2><div class="sub err">${e.message}</div>`;
  }
}

// events -------------------------------------------------------------------
$('#tabs').addEventListener('click', (e) => {
  const t = e.target.closest('.tab'); if (!t) return;
  document.querySelectorAll('.tab').forEach(x => x.classList.toggle('on', x === t));
  tab = t.dataset.t; loadList();
});
$('#q').addEventListener('input', (e) => { query = e.target.value; render(); });
$('#list').addEventListener('click', (e) => {
  const star = e.target.closest('.star');
  if (star) { toggleWatch(star.dataset.star); return; }
  const r = e.target.closest('.row'); if (r) openSheet(r.dataset.sym);
});
$('#sheetBg').addEventListener('click', (e) => {
  if (e.target.id === 'sheetBg') $('#sheetBg').classList.remove('show');
});
$('#sheet').addEventListener('click', (e) => {
  const s = e.target.closest('[data-sheetstar]');
  if (!s) return;
  toggleWatch(s.dataset.sheetstar);
  const on = watch.has(s.dataset.sheetstar);
  s.textContent = on ? '★' : '☆';
  s.classList.toggle('on', on);
});

// poll ---------------------------------------------------------------------
loadIndex(); loadList();
setInterval(loadIndex, 4000);
setInterval(() => { if (!$('#sheetBg').classList.contains('show')) loadList(); }, 4000);
</script>
</body>
</html>
