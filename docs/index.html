<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#EBECE7" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#0E1317" media="(prefers-color-scheme: dark)" />
<title>ASE Live · Amman Stock Exchange</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #EBECE7; --card: #F6F6F1; --ink: #191C21; --stone: #61666E;
    --line: #D6D7D0; --hair: #E2E3DC; --accent: #14477E;
    --up: #0B7A54; --down: #B23A2E; --flat: #7A7F86;
    --up-bg: rgba(11,122,84,.11); --down-bg: rgba(178,58,46,.10);
    --font-sans: "IBM Plex Sans", ui-sans-serif, system-ui, "Segoe UI", Roboto, sans-serif;
    --font-mono: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    --font-ar: "IBM Plex Sans Arabic", var(--font-sans);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #0E1317; --card: #151B21; --ink: #E9EAE4; --stone: #8A9099;
      --line: #232A31; --hair: #1A2026; --accent: #5B9BE6;
      --up: #2BB27E; --down: #E06B5E; --flat: #7E858D;
      --up-bg: rgba(43,178,126,.13); --down-bg: rgba(224,107,94,.12);
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font: 15px/1.45 var(--font-sans);
    padding-bottom: calc(16px + env(safe-area-inset-bottom));
    -webkit-font-smoothing: antialiased;
  }
  .tnum { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  .dir-up { color: var(--up); } .dir-down { color: var(--down); } .dir-flat { color: var(--flat); }

  /* ---- masthead ---- */
  header {
    position: sticky; top: 0; z-index: 5; background: var(--paper);
    padding: calc(12px + env(safe-area-inset-top)) 16px 0;
    border-bottom: 1px solid var(--line);
  }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .wm { font-weight: 700; font-size: 17px; letter-spacing: .04em; }
  .wm b { color: var(--ink); } .wm i { font-style: normal; font-weight: 500; color: var(--accent); margin-left: 2px; }
  .brand .ar { font-family: var(--font-ar); font-size: 12px; color: var(--stone); }
  .brand .live {
    margin-left: auto; display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; font-weight: 600; letter-spacing: .14em; color: var(--stone);
  }
  .brand .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--up); animation: pulse 2.4s ease-in-out infinite; }

  .index { padding: 14px 0 12px; }
  .ix-label { font-size: 10.5px; font-weight: 600; letter-spacing: .13em; text-transform: uppercase; color: var(--stone); }
  .ix-row { display: flex; align-items: baseline; gap: 12px; margin-top: 4px; }
  .ix-val { font-family: var(--font-mono); font-weight: 600; font-size: 34px; letter-spacing: -.01em; line-height: 1; }
  .ix-chg { font-family: var(--font-mono); font-weight: 600; font-size: 15px; }
  .ix-chg .tri { margin-right: 3px; }
  .ix-meta { font-family: var(--font-mono); font-size: 11px; color: var(--stone); margin-top: 7px; letter-spacing: .01em; }

  .search {
    width: 100%; margin: 2px 0 12px; background: var(--card); color: var(--ink);
    border: 1px solid var(--line); border-radius: 3px; padding: 10px 12px;
    font: 500 14px var(--font-sans); outline: none;
  }
  .search::placeholder { color: var(--stone); }
  .search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent); }

  .tabs { display: flex; gap: 20px; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 0 0 auto; background: none; border: 0; cursor: pointer;
    padding: 4px 0 11px; margin: 0; color: var(--stone);
    font: 600 12px var(--font-sans); letter-spacing: .07em; text-transform: uppercase;
    border-bottom: 2px solid transparent;
  }
  .tab.on { color: var(--ink); border-bottom-color: var(--accent); }

  /* ---- ledger list ---- */
  ul { list-style: none; margin: 0; padding: 0; }
  .row {
    display: grid; grid-template-columns: 20px 1fr auto auto; align-items: center; gap: 12px;
    padding: 12px 16px; border-bottom: 1px solid var(--hair);
    border-left: 3px solid transparent; cursor: pointer;
  }
  .row.dir-up { border-left-color: color-mix(in srgb, var(--up) 55%, transparent); }
  .row.dir-down { border-left-color: color-mix(in srgb, var(--down) 55%, transparent); }
  .row.dir-flat { border-left-color: var(--hair); }
  .row:active { background: var(--card); }
  .star {
    background: none; border: 0; padding: 4px 0; margin: 0; cursor: pointer;
    font-size: 17px; line-height: 1; color: var(--line);
  }
  .star.on { color: #D9A21B; }
  .rw-id { min-width: 0; }
  .rw-sym { font-weight: 600; font-size: 15px; letter-spacing: .01em; }
  .rw-name { display: block; color: var(--stone); font-size: 11px; margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 44vw; }
  .rw-last { font-family: var(--font-mono); font-weight: 600; font-size: 15px; text-align: right; }
  .rw-chg { font-family: var(--font-mono); font-weight: 500; font-size: 12.5px; text-align: right; min-width: 78px; }
  .rw-chg .tri { font-size: 9px; margin-right: 3px; vertical-align: 1px; }
  .row.dir-up .rw-chg { color: var(--up); } .row.dir-down .rw-chg { color: var(--down); } .row.dir-flat .rw-chg { color: var(--flat); }

  .flash-up { animation: fUp .9s ease-out; } .flash-down { animation: fDn .9s ease-out; }
  @keyframes fUp { from { background: var(--up-bg); } to { background: transparent; } }
  @keyframes fDn { from { background: var(--down-bg); } to { background: transparent; } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

  .muted { color: var(--stone); text-align: center; padding: 40px 24px; font-size: 13px; }
  .muted.err { color: var(--down); }

  /* ---- detail sheet ---- */
  .sheet-bg { position: fixed; inset: 0; background: rgba(10,12,15,.5); z-index: 20; display: none; }
  .sheet-bg.show { display: block; }
  .sheet {
    position: absolute; left: 0; right: 0; bottom: 0; max-height: 88vh; overflow: auto;
    background: var(--paper); border-top: 2px solid var(--accent);
    border-radius: 14px 14px 0 0; padding: 14px 18px calc(24px + env(safe-area-inset-bottom));
    transform: translateY(100%); transition: transform .28s cubic-bezier(.22,.61,.36,1);
  }
  .sheet-bg.show .sheet { transform: translateY(0); }
  .grab { width: 38px; height: 4px; background: var(--line); border-radius: 99px; margin: 0 auto 14px; }
  .sh-head { display: flex; align-items: center; gap: 8px; }
  .sh-star { background: none; border: 0; cursor: pointer; font-size: 22px; line-height: 1; color: var(--line); padding: 0; }
  .sh-star.on { color: #D9A21B; }
  .sh-sym { font-weight: 700; font-size: 22px; letter-spacing: .01em; }
  .sh-name { color: var(--stone); font-size: 12px; margin: 3px 0 14px; }

  .q-now { display: flex; align-items: baseline; gap: 10px; }
  .q-price { font-family: var(--font-mono); font-weight: 600; font-size: 32px; line-height: 1; }
  .q-delta { font-family: var(--font-mono); font-weight: 500; font-size: 14px; }

  .ohlc { display: grid; grid-template-columns: repeat(4, 1fr); margin: 16px 0 6px;
    border: 1px solid var(--line); border-radius: 4px; overflow: hidden; background: var(--card); }
  .ohlc .cell { padding: 9px 10px; }
  .ohlc .cell + .cell { border-left: 1px solid var(--line); }
  .ohlc .k { display: block; font-size: 9.5px; font-weight: 600; letter-spacing: .09em; text-transform: uppercase; color: var(--stone); }
  .ohlc .v { display: block; font-family: var(--font-mono); font-weight: 600; font-size: 15px; margin-top: 3px; }

  .chartwrap { margin: 16px 0 4px; }
  .spark { width: 100%; height: 104px; display: block; }
  .chartcap { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 10.5px; color: var(--stone); margin-top: 5px; }

  .seclabel { font-size: 10.5px; font-weight: 600; letter-spacing: .11em; text-transform: uppercase; color: var(--stone); margin: 20px 0 8px; }
  .ladder { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .ladder .col .lh { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--stone); margin-bottom: 5px; }
  .lvl { position: relative; display: flex; justify-content: space-between; align-items: center;
    font-family: var(--font-mono); font-size: 12.5px; padding: 5px 8px; margin: 2px 0; border-radius: 3px; overflow: hidden; }
  .lvl > span { position: relative; z-index: 1; }
  .lvl::before { content: ""; position: absolute; top: 0; bottom: 0; z-index: 0; }
  .lvl.bid::before { right: 0; width: var(--f, 0%); background: var(--up-bg); }
  .lvl.ask::before { left: 0; width: var(--f, 0%); background: var(--down-bg); }
  .lvl.bid .p { color: var(--up); } .lvl.ask .p { color: var(--down); }
  .lvl .q { color: var(--stone); }

  .tape .tr { display: grid; grid-template-columns: auto 1fr auto; gap: 12px; align-items: baseline;
    font-family: var(--font-mono); font-size: 12.5px; padding: 6px 2px; border-bottom: 1px solid var(--hair); }
  .tape .tm { color: var(--stone); font-size: 11.5px; }
  .tape .tp.dir-up { color: var(--up); } .tape .tp.dir-down { color: var(--down); }
  .tape .tq { color: var(--stone); }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; }
    .sheet { transition: none; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <span class="wm"><b>ASE</b><i>LIVE</i></span>
    <span class="ar">بورصة عمّان</span>
    <span class="live"><span class="dot"></span>LIVE</span>
  </div>
  <div class="index">
    <div class="ix-label">ASE General Index</div>
    <div class="ix-row">
      <span class="ix-val" id="idxVal">—</span>
      <span class="ix-chg" id="idxChg"></span>
    </div>
    <div class="ix-meta" id="idxMeta"></div>
  </div>
  <input class="search" id="q" placeholder="Search symbol or company" autocomplete="off" />
  <nav class="tabs" id="tabs">
    <button class="tab on" data-t="all">All</button>
    <button class="tab" data-t="watch">Watch</button>
    <button class="tab" data-t="gainers">Gainers</button>
    <button class="tab" data-t="losers">Losers</button>
    <button class="tab" data-t="active">Active</button>
  </nav>
</header>

<ul id="list"><li class="muted">Loading the tape…</li></ul>

<div class="sheet-bg" id="sheetBg"><div class="sheet" id="sheet"></div></div>

<script>
// ---------------------------------------------------------------------------
// Fully static — talks DIRECTLY to the public ASELive JSONP endpoints via
// <script> injection (responses are fn(new Array(...)) calls). No backend.
// ---------------------------------------------------------------------------
const BASE = 'https://aselive.jo/v3/';
const $ = (s) => document.querySelector(s);
let tab = 'all', allRows = [], listData = [], query = '';
let watch = new Set(JSON.parse(localStorage.getItem('ase_watch') || '[]'));
let lastPx = {}, flashSet = null;
const saveWatch = () => localStorage.setItem('ase_watch', JSON.stringify([...watch]));
function toggleWatch(sym) {
  if (watch.has(sym)) watch.delete(sym); else watch.add(sym);
  saveWatch();
  if (tab === 'watch') loadList(); else render();
}

const fmt = (n, d = 2) => (n == null ? '—' : Number(n).toLocaleString(undefined, { minimumFractionDigits: d, maximumFractionDigits: d }));
const dir = (n) => (n > 0 ? 'up' : n < 0 ? 'down' : 'flat');
const sign = (n) => (n == null ? '' : (n > 0 ? '+' : '') + fmt(n, 2) + '%');
const tri = (n) => (n > 0 ? '▲' : n < 0 ? '▼' : '·');
const num = (s) => { if (s == null) return null; const n = parseFloat(String(s).replace(/,/g, '')); return Number.isFinite(n) ? n : null; };

// --- JSONP loader (one in-flight call per fixed function name) --------------
const _pending = {}, _locks = {};
['ticker', 'market_index', 'market_gainers', 'market_losers', 'getDataSvc_NotChanged',
 'market_value', 'market_depth', 'market_intraday'].forEach((fn) => {
  window[fn] = function () { const r = _pending[fn]; if (r) { delete _pending[fn]; r([].slice.call(arguments)); } };
});
function _rawJSONP(fn, url) {
  return new Promise((resolve, reject) => {
    _pending[fn] = resolve;
    const s = document.createElement('script');
    s.src = BASE + url + (url.includes('?') ? '&' : '?') + '_=' + Date.now();
    s.onerror = () => { if (_pending[fn]) { delete _pending[fn]; reject(new Error('load failed: ' + url)); } };
    s.onload = () => s.remove();
    document.head.appendChild(s);
    setTimeout(() => { if (_pending[fn]) { delete _pending[fn]; reject(new Error('timeout: ' + fn)); } }, 12000);
  });
}
function jsonp(fn, url) {
  const prev = _locks[fn] || Promise.resolve();
  const next = prev.catch(() => {}).then(() => _rawJSONP(fn, url));
  _locks[fn] = next.catch(() => {});
  return next;
}

// --- company-name map ------------------------------------------------------
const names = { ASE20: 'ASE20 Index', ASETR: 'ASE Total Return Index', PX1: 'ASE Price Index' };
function learn(syms, nms) { if (syms && nms) for (let i = 0; i < syms.length; i++) if (nms[i]) names[syms[i]] = nms[i]; }
let namesBuilt = false;
async function buildNames() {
  for (const [fn, url] of [['market_gainers', 'Gainers.php'], ['market_losers', 'losers.php'], ['getDataSvc_NotChanged', 'not_changed.php']]) {
    try { const a = await jsonp(fn, url); learn(a[0], a[1]); } catch (e) {}
  }
  namesBuilt = true;
}

// --- loaders ---------------------------------------------------------------
async function loadIndex() {
  try {
    const v = (await jsonp('market_index', 'index.php'))[0] || [];
    const value = num(v[0]), chg = num(v[1]), pts = num(v[2]);
    $('#idxVal').textContent = fmt(value);
    const c = $('#idxChg');
    c.className = 'ix-chg dir-' + dir(chg);
    c.innerHTML = `<span class="tri">${tri(chg)}</span>${chg > 0 ? '+' : ''}${fmt(pts)} · ${sign(chg)}`;
    $('#idxMeta').textContent = `VOL ${fmt(num(v[7]),0)}   VAL ${fmt(num(v[8]),0)}   ${fmt(num(v[9]),0)} TRADES`;
  } catch (e) {}
}

function mapList(a, chgIdx) {
  const syms = a[0] || [], nms = a[1] || [], price = a[2] || [], chg = a[chgIdx] || [];
  learn(syms, nms);
  return syms.map((s, i) => ({ sym: s, name: nms[i] || names[s] || null, last: num(price[i]), chg: num(chg[i]) }));
}

async function loadList() {
  try {
    if (!namesBuilt) await buildNames();
    if (tab === 'all' || tab === 'watch') {
      const a = await jsonp('ticker', 'ticker.php');
      const syms = a[0] || [], last = a[1] || [], chg = a[2] || [];
      allRows = syms.map((s, i) => ({ sym: s, name: names[s] || null, last: num(last[i]), chg: num(chg[i]) })).filter((r) => r.last != null);
      listData = tab === 'watch' ? allRows.filter((r) => watch.has(r.sym)) : allRows;
    } else if (tab === 'gainers') { listData = mapList(await jsonp('market_gainers', 'Gainers.php'), 3); }
    else if (tab === 'losers') { listData = mapList(await jsonp('market_losers', 'losers.php'), 3); }
    else if (tab === 'active') { listData = mapList(await jsonp('market_value', 'activeByValue.php'), 4); }
    // detect price ticks for the flash micro-interaction
    flashSet = {};
    for (const r of listData) { if (lastPx[r.sym] != null && lastPx[r.sym] !== r.last) flashSet[r.sym] = r.last > lastPx[r.sym] ? 'up' : 'down'; lastPx[r.sym] = r.last; }
    render();
  } catch (e) {
    $('#list').innerHTML = `<li class="muted err">Couldn’t reach the exchange feed — ${e.message}. Retrying…</li>`;
  }
}

function render() {
  const q = query.toLowerCase();
  const rows = listData.filter((r) => !q || r.sym.toLowerCase().includes(q) || (r.name || '').toLowerCase().includes(q));
  if (!rows.length) {
    $('#list').innerHTML = `<li class="muted">${tab === 'watch' && !q ? 'No symbols yet — tap ☆ on any row to follow it.' : 'No matches.'}</li>`;
    flashSet = null; return;
  }
  const fl = flashSet || {};
  $('#list').innerHTML = rows.map((r) => {
    const f = fl[r.sym] ? ` flash-${fl[r.sym]}` : '';
    return `<li class="row dir-${dir(r.chg)}${f}" data-sym="${r.sym}">
      <button class="star${watch.has(r.sym) ? ' on' : ''}" data-star="${r.sym}" aria-label="Toggle watch">${watch.has(r.sym) ? '★' : '☆'}</button>
      <div class="rw-id"><span class="rw-sym">${r.sym}</span>${r.name ? `<span class="rw-name">${r.name}</span>` : ''}</div>
      <span class="rw-last">${fmt(r.last)}</span>
      <span class="rw-chg"><span class="tri">${tri(r.chg)}</span>${sign(r.chg)}</span>
    </li>`;
  }).join('');
  flashSet = null;
}

// --- intraday sparkline ----------------------------------------------------
function buildChart(prices, prevClose, d) {
  if (!prices || prices.length < 2) return '<div class="muted" style="padding:22px">No intraday trades yet.</div>';
  const W = 320, H = 104, pad = 12;
  const lo = Math.min(...prices, prevClose), hi = Math.max(...prices, prevClose);
  const span = (hi - lo) || 1;
  const X = (i) => (i / (prices.length - 1)) * W;
  const Y = (v) => H - pad - ((v - lo) / span) * (H - 2 * pad);
  const pts = prices.map((p, i) => `${X(i).toFixed(1)},${Y(p).toFixed(1)}`);
  const baseY = Y(prevClose).toFixed(1);
  const col = d > 0 ? 'var(--up)' : d < 0 ? 'var(--down)' : 'var(--flat)';
  const ex = X(prices.length - 1).toFixed(1), ey = Y(prices[prices.length - 1]).toFixed(1);
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <line x1="0" y1="${baseY}" x2="${W}" y2="${baseY}" stroke="var(--stone)" stroke-width="1" stroke-dasharray="3 3" opacity=".55" vector-effect="non-scaling-stroke"/>
    <path d="M${X(0)},${H} L${pts.join(' L')} L${ex},${H} Z" fill="${col}" opacity=".13"/>
    <path d="M${pts.join(' L')}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
    <circle cx="${ex}" cy="${ey}" r="3.2" fill="${col}"/>
  </svg>`;
}

// --- detail sheet ----------------------------------------------------------
async function openSheet(sym) {
  $('#sheetBg').classList.add('show');
  const sheet = $('#sheet');
  sheet.innerHTML = `<div class="grab"></div><div class="sh-head"><span class="sh-sym">${sym}</span></div><div class="sh-name">Loading…</div>`;
  try {
    const [d, ia] = await Promise.all([
      jsonp('market_depth', 'depth.php?symbol=' + encodeURIComponent(sym)),
      jsonp('market_intraday', 'intraday.php?symbol=' + encodeURIComponent(sym)),
    ]);
    const askPx = d[0] || [], askQty = d[1] || [], bidPx = d[3] || [], bidQty = d[4] || [];
    const ask = askPx.map((p, i) => ({ price: num(p), qty: num(askQty[i]) })).filter((l) => l.price);
    const bid = bidPx.map((p, i) => ({ price: num(p), qty: num(bidQty[i]) })).filter((l) => l.price);
    const maxQ = Math.max(1, ...ask.map((l) => l.qty || 0), ...bid.map((l) => l.qty || 0));
    const trades = (ia[0] || []).map((t, i) => ({ time: t, qty: num((ia[1] || [])[i]), price: num((ia[2] || [])[i]) }));

    const row = allRows.find((r) => r.sym === sym) || { sym, name: names[sym] || null };
    const prices = trades.map((t) => t.price).filter(Number.isFinite);
    const current = row.last != null ? row.last : prices.length ? prices[0] : null;
    const chg = row.chg != null ? row.chg : null;
    const prevClose = current != null && chg != null ? +(current / (1 + chg / 100)).toFixed(3) : null;
    const q = {
      name: row.name || names[sym] || null, current, changePct: chg,
      change: current != null && prevClose != null ? +(current - prevClose).toFixed(3) : null,
      open: prices.length ? prices[prices.length - 1] : null,
      high: prices.length ? Math.max(...prices) : null,
      low: prices.length ? Math.min(...prices) : null, prevClose,
    };
    const dd = q.changePct;
    const bar = (l, side) => `<div class="lvl ${side}" style="--f:${((l.qty || 0) / maxQ * 100).toFixed(0)}%"><span class="p">${fmt(l.price)}</span><span class="q">${fmt(l.qty,0)}</span></div>`;
    const bids = bid.map((l) => bar(l, 'bid')).join('') || '<div class="muted" style="padding:10px">—</div>';
    const asks = ask.map((l) => bar(l, 'ask')).join('') || '<div class="muted" style="padding:10px">—</div>';
    const tape = trades.length
      ? trades.map((t) => `<div class="tr"><span class="tm">${t.time}</span><span class="tp dir-${dir(prevClose != null ? t.price - prevClose : 0)}">${fmt(t.price)}</span><span class="tq">${fmt(t.qty,0)}</span></div>`).join('')
      : '<div class="muted" style="padding:14px">No trades yet.</div>';
    const chrono = prices.slice().reverse();

    sheet.innerHTML = `
      <div class="grab"></div>
      <div class="sh-head">
        <button class="sh-star${watch.has(sym) ? ' on' : ''}" data-sheetstar="${sym}" aria-label="Toggle watch">${watch.has(sym) ? '★' : '☆'}</button>
        <span class="sh-sym">${sym}</span>
      </div>
      <div class="sh-name">${q.name || ''}</div>
      <div class="q-now">
        <span class="q-price dir-${dir(dd)}">${fmt(q.current)}</span>
        <span class="q-delta dir-${dir(dd)}">${q.change != null ? (dd > 0 ? '+' : '') + fmt(q.change) : ''} ${dd != null ? '(' + sign(dd) + ')' : ''}</span>
      </div>
      <div class="ohlc">
        <div class="cell"><span class="k">Open</span><span class="v">${fmt(q.open)}</span></div>
        <div class="cell"><span class="k">High</span><span class="v dir-up">${fmt(q.high)}</span></div>
        <div class="cell"><span class="k">Low</span><span class="v dir-down">${fmt(q.low)}</span></div>
        <div class="cell"><span class="k">Prev</span><span class="v">${fmt(q.prevClose)}</span></div>
      </div>
      <div class="chartwrap">
        ${buildChart(chrono, q.prevClose, dd)}
        <div class="chartcap"><span>${trades.length ? trades[trades.length - 1].time : ''}</span><span>prev close ${fmt(q.prevClose)}</span><span>${trades.length ? trades[0].time : ''}</span></div>
      </div>
      <div class="seclabel">Order book</div>
      <div class="ladder">
        <div class="col"><div class="lh">Bid</div>${bids}</div>
        <div class="col"><div class="lh">Ask</div>${asks}</div>
      </div>
      <div class="seclabel">Recent trades</div>
      <div class="tape">${tape}</div>`;
  } catch (e) {
    sheet.innerHTML = `<div class="grab"></div><div class="sh-head"><span class="sh-sym">${sym}</span></div><div class="sh-name err" style="color:var(--down)">${e.message}</div>`;
  }
}

// --- events ----------------------------------------------------------------
$('#tabs').addEventListener('click', (e) => {
  const t = e.target.closest('.tab'); if (!t) return;
  document.querySelectorAll('.tab').forEach((x) => x.classList.toggle('on', x === t));
  tab = t.dataset.t; lastPx = {}; loadList();
});
$('#q').addEventListener('input', (e) => { query = e.target.value; render(); });
$('#list').addEventListener('click', (e) => {
  const star = e.target.closest('.star');
  if (star) { toggleWatch(star.dataset.star); return; }
  const r = e.target.closest('.row'); if (r) openSheet(r.dataset.sym);
});
$('#sheetBg').addEventListener('click', (e) => { if (e.target.id === 'sheetBg') $('#sheetBg').classList.remove('show'); });
$('#sheet').addEventListener('click', (e) => {
  const s = e.target.closest('[data-sheetstar]'); if (!s) return;
  toggleWatch(s.dataset.sheetstar);
  const on = watch.has(s.dataset.sheetstar);
  s.textContent = on ? '★' : '☆'; s.classList.toggle('on', on);
});

// --- poll ------------------------------------------------------------------
loadIndex(); loadList();
setInterval(loadIndex, 4000);
setInterval(() => { if (!$('#sheetBg').classList.contains('show')) loadList(); }, 4000);
</script>
</body>
</html>
